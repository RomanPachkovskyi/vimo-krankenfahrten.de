services:
  web:
    image: node:20-alpine
    container_name: vimo-krankenfahrten-onepage
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8083"
    ports:
      - "8083:8083"
    volumes:
      - ./site:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    restart: unless-stopped
